name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu
            artifact: linux-amd64
          - target: aarch64-linux-gnu
            artifact: linux-arm64
          - target: x86_64-macos
            artifact: darwin-amd64
          - target: aarch64-macos
            artifact: darwin-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          zig build \
            -Doptimize=ReleaseSmall \
            "-Dversion=$VERSION" \
            "-Dtarget=$TARGET" \
            --prefix zig-out

      - name: Package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACT: ${{ matrix.artifact }}
        run: tar -czf "wt-zig-${VERSION}-${ARTIFACT}.tar.gz" -C zig-out/bin wt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wt-zig-${{ matrix.artifact }}
          path: wt-zig-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          retry() {
            local attempt=1
            local max_attempts=3
            while true; do
              "$@" && return 0
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              sleep $((attempt * 2))
              attempt=$((attempt + 1))
            done
          }

          release_notes="See [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md) for details."
          if retry gh release view "$TAG" >/dev/null 2>&1; then
            retry gh release edit "$TAG" \
              --title "$TAG" \
              --notes "$release_notes"
            retry gh release upload "$TAG" wt-zig-*.tar.gz --clobber
          else
            retry gh release create "$TAG" \
              --title "$TAG" \
              --notes "$release_notes" \
              wt-zig-*.tar.gz
          fi
