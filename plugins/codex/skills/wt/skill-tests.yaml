skill: codex:wt
model: haiku

tests:
  - id: wt-explain
    prompt: "explain what wt-zig is and how to use it"
    should_trigger: true

  - id: wt-create-worktree
    prompt: "how do I create a worktree for a new feature branch?"
    should_trigger: true

  - id: wt-checkout-pr
    prompt: "how do I checkout a GitHub PR with wt?"
    should_trigger: true

  - id: wt-switch
    prompt: "how do I switch to a worktree by branch name?"
    should_trigger: true

  - id: wt-cd-alias
    prompt: "how do I use wt cd to switch to a worktree?"
    should_trigger: true

  - id: wt-switch-execute
    prompt: "how do I launch claude after switching to a worktree?"
    should_trigger: true

  - id: wt-done
    prompt: "what does wt done do?"
    should_trigger: true

  - id: wt-step-diff
    prompt: "how do I show all branch changes including untracked files with wt?"
    should_trigger: true

  - id: wt-step-copy-ignored
    prompt: "how do I copy ignored files like node_modules into a new worktree?"
    should_trigger: true

  - id: wt-step-primitives
    prompt: "can wt step squash and push my current worktree branch?"
    should_trigger: true

  - id: wt-aliases
    prompt: "how do I add a custom wt alias in .wt.toml?"
    should_trigger: true

  - id: wt-merge
    prompt: "how do I merge my current worktree branch back to main?"
    should_trigger: true

  - id: wt-merge-pipeline
    prompt: "does wt merge rebase and push by default or do I opt in?"
    should_trigger: true

  - id: wt-ui
    prompt: "can wt open an interactive picker to jump or remove worktrees?"
    should_trigger: true

  - id: wt-rm-interactive
    prompt: "what happens if I run wt rm without any arguments?"
    should_trigger: true

  - id: wt-hooks-env
    prompt: "how do I set up hooks in wt to copy .env files?"
    should_trigger: true

  - id: wt-completion
    prompt: "how do I enable completion for wt in zsh?"
    should_trigger: true

  - id: unrelated-git-rebase
    prompt: "how do I rebase my branch?"
    should_trigger: false

  - id: unrelated-docker
    prompt: "how do I build a Docker image?"
    should_trigger: false
